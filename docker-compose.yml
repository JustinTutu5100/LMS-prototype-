version: "3.9"

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: lms_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_network

  # MongoDB
  mongo:
    image: mongo:7
    container_name: lms_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lms_network

  # Backend
  backend:
    build: ./backend
    container_name: lms_backend
    environment:
      PORT: 5000
      PG_USER: justintutu
      PG_PASS: mosestutu
      PG_DB: lms
      PG_HOST: postgres
      PG_PORT: 5432
      MONGO_URI: mongodb://mongo:27017/lms
      JWT_SECRET: supersecretkey
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo
    networks:
      - lms_network

  # Frontend
  frontend:
    build: ./frontend
    container_name: lms_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - lms_network

volumes:
  postgres_data:
  mongo_data:

networks:
  lms_network:
    driver: bridge